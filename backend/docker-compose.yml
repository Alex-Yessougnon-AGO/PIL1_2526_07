version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mentorlink
      POSTGRES_USER: mentorlink
      POSTGRES_PASSWORD: mentorlink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentorlink"]
      interval: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_NAME: mentorlink
      DB_USER: mentorlink
      DB_PASSWORD: mentorlink
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - media:/app/media

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_NAME: mentorlink
      DB_USER: mentorlink
      DB_PASSWORD: mentorlink
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_NAME: mentorlink
      DB_USER: mentorlink
      DB_PASSWORD: mentorlink
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
  media:
