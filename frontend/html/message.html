<!DOCTYPE html>
<html class="light" lang="fr" data-page="messages">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MentorLink | Messages</title>
       <!-- Chargement des outils externes (Tailwind & Fonts) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Fichiers locaux séparés -->
    <link rel="stylesheet" href="../css/message.css">
    <script src="../tailwind/tailwind.config.js"></script>
  </head>
  <body class="m-0 bg-background text-on-background font-body-md min-h-screen flex overflow-hidden">
    <div data-sidebar="icon"></div>
    <main class="flex flex-1 ml-0 md:ml-16 h-screen overflow-hidden">
      <section id="conversation-list" class="w-full md:w-80 lg:w-96 flex flex-col bg-surface-container-low border-r border-outline-variant h-full pb-[60px] md:pb-0">
        <div class="p-md bg-surface-container-lowest border-b border-outline-variant">
          <h2 class="font-title-lg text-title-lg text-on-surface font-bold mb-md">Messages</h2>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
            <input class="w-full pl-10 pr-4 py-2 bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary text-label-md font-label-md" placeholder="Rechercher une conversation..." type="text" />
          </div>
        </div>
        <div id="conversation-items" class="flex-grow overflow-y-auto custom-scrollbar">
          <div class="p-md flex items-center justify-center text-center py-8">
            <div>
              <span class="material-symbols-outlined text-4xl text-outline mb-2">chat</span>
              <p class="text-label-md text-outline">Chargement des conversations...</p>
            </div>
          </div>
        </div>
      </section>
      <section id="chat-thread" class="hidden md:flex flex-col flex-grow bg-surface-container-lowest h-full relative pb-[60px] md:pb-0">
        <header id="thread-header" class="hidden p-md border-b border-outline-variant flex items-center justify-between bg-surface-container-lowest z-10">
          <div class="flex items-center gap-md">
            <button id="back-button" class="md:hidden p-1 flex items-center justify-center">
              <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div class="relative">
              <img id="thread-avatar" alt="Profile" class="w-10 h-10 rounded-full object-cover" src="https://ui-avatars.com/api/?name=Chargement&background=005fac&color=fff&size=40" />
              <span class="absolute bottom-0 right-0 w-3 h-3 bg-secondary border-2 border-surface-container-lowest rounded-full"></span>
            </div>
            <div>
              <h3 id="thread-title" class="font-headline-md text-body-lg font-bold">Chargement...</h3>
              <p id="thread-status" class="text-caption text-secondary flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-secondary"></span> En ligne
              </p>
            </div>
          </div>
          <div class="flex items-center gap-sm">
            <button class="p-2 hover:bg-surface-container rounded-full transition-colors text-on-surface-variant">
              <span class="material-symbols-outlined">call</span>
            </button>
            <button class="p-2 hover:bg-surface-container rounded-full transition-colors text-on-surface-variant">
              <span class="material-symbols-outlined">videocam</span>
            </button>
            <button class="p-2 hover:bg-surface-container rounded-full transition-colors text-on-surface-variant">
              <span class="material-symbols-outlined">info</span>
            </button>
          </div>
        </header>
        <div id="messages-container" class="flex-grow overflow-y-auto p-gutter custom-scrollbar binary-pattern">
          <div class="flex flex-col items-center justify-center h-full text-center p-8">
            <span class="material-symbols-outlined text-5xl text-outline mb-3">forum</span>
            <p class="text-body-md text-outline">Sélectionnez une conversation</p>
            <p class="text-caption text-outline mt-1">ou créez-en une nouvelle pour commencer</p>
          </div>
        </div>
        <form id="message-form" class="hidden p-md bg-surface-container-lowest border-t border-outline-variant">
          <div class="flex items-center gap-sm max-w-4xl mx-auto bg-surface-container-low rounded-xl p-2 focus-within:ring-2 focus-within:ring-primary transition-all">
            <button type="button" class="p-2 hover:bg-surface-container-highest rounded-lg transition-colors text-primary">
              <span class="material-symbols-outlined">add_circle</span>
            </button>
            <textarea id="message-input" class="flex-grow bg-transparent border-none focus:ring-0 text-body-md py-2 resize-none max-h-32 custom-scrollbar" placeholder="Votre message..." rows="1"></textarea>
            <div class="flex items-center gap-xs pr-2">
              <button type="button" class="p-2 hover:bg-surface-container-highest rounded-lg transition-colors text-on-surface-variant">
                <span class="material-symbols-outlined">mood</span>
              </button>
              <button type="submit" id="send-button" class="w-10 h-10 bg-primary text-on-primary flex items-center justify-center rounded-lg hover:bg-primary-container transition-colors shadow-md">
                <span class="material-symbols-outlined">send</span>
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-surface-container-lowest flex justify-around items-center p-sm border-t border-outline-variant z-50">
      <a class="flex flex-col items-center gap-xs text-outline" href="dashboard.html">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="text-[10px]">Home</span>
      </a>
      <a class="flex flex-col items-center gap-xs text-outline" href="feed-ifri.html">
        <span class="material-symbols-outlined">dynamic_feed</span>
        <span class="text-[10px]">Feed</span>
      </a>
      <a class="flex flex-col items-center gap-xs text-primary font-bold" href="message.html">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">forum</span>
        <span class="text-[10px]">Messages</span>
      </a>
      <a class="flex flex-col items-center gap-xs text-outline" href="notifs.html">
        <span class="material-symbols-outlined">notifications</span>
        <span class="text-[10px]">Alerts</span>
      </a>
      <a class="flex flex-col items-center gap-xs text-outline" href="mon-profile.html">
        <span class="material-symbols-outlined">person</span>
        <span class="text-[10px]">Profile</span>
      </a>
    </nav>
    <script src="../js/include.js"></script>
    <script type="module" src="../js/message.js"></script>
  </body>
</html>
